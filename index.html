<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全息粒子手势控制系统 - 终端控制版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        .input_video { display: none; }
        
        /* 左上角状态信息 */
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #00ffff; pointer-events: none; text-shadow: 0 0 5px rgba(0,255,255,0.5); }
        #statusText { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .instruction { font-size: 14px; color: #aaa; line-height: 1.6; }
        b { color: #fff; }

        /* 右侧控制终端 */
        #terminal-wrapper {
            position: absolute; right: 20px; top: 20px;
            display: flex; align-items: flex-start;
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #terminal-wrapper.collapsed { transform: translateX(280px); } /* 隐藏时移出屏幕 */
        
        #toggle-btn {
            background: rgba(0, 20, 20, 0.7); border: 1px solid #00ffff; border-right: none;
            color: #00ffff; padding: 15px 10px; cursor: pointer; writing-mode: vertical-lr;
            text-shadow: 0 0 5px #00ffff; box-shadow: -2px 0 5px rgba(0,255,255,0.2);
        }
        #toggle-btn:hover { background: rgba(0, 50, 50, 0.9); }

        #terminal-panel {
            background: rgba(0, 15, 15, 0.85); border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
            width: 240px; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .term-header { font-size: 18px; font-weight: bold; color: #00ffff; border-bottom: 1px solid #00ffff; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .term-group { margin-bottom: 15px; }
        .term-label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
        
        /* 终端控件样式 */
        select, input[type="color"], input[type="range"] {
            width: 100%; background: #002222; border: 1px solid #008888; color: #00ffff;
            padding: 5px; font-family: 'Courier New', Courier, monospace; outline: none;
        }
        input[type="range"] { -webkit-appearance: none; padding: 0; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #00ffff; border-radius: 50%; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="statusText">⚪ 正在初始化全息系统...</div>
        <div class="instruction">
            1. <b>手掌全开</b>：进入星球内部。<br>
            2. <b>食指单立</b>：锁定视角并控制旋转！<br>
            3. <b>握紧拳头</b>：退出内部，收缩全貌。
        </div>
    </div>

    <div id="terminal-wrapper">
        <button id="toggle-btn">◀ 终端面板</button>
        <div id="terminal-panel">
            <div class="term-header">HOLO-CONSOLE</div>
            
            <div class="term-group">
                <label class="term-label">投影矩阵图案 (PATTERN)</label>
                <select id="shape-select">
                    <option value="sphere">双重星体 (Dual Sphere)</option>
                    <option value="galaxy">星际涡流 (Galaxy Spiral)</option>
                    <option value="torus">时空星环 (Wormhole Torus)</option>
                </select>
            </div>

            <div class="term-group">
                <label class="term-label">全息主题色 (COLOR)</label>
                <input type="color" id="color-picker" value="#00ffff">
            </div>

            <div class="term-group">
                <label class="term-label">内层算力 (CORE PARTICLES)</label>
                <input type="range" id="inner-count" min="1000" max="12000" value="8000">
            </div>

            <div class="term-group">
                <label class="term-label">外层算力 (SHELL PARTICLES)</label>
                <input type="range" id="outer-count" min="1000" max="12000" value="5300">
            </div>
        </div>
    </div>

    <video class="input_video" autoplay playsinline></video>

    <script>
        // ==========================================
        // 1. 初始化 Three.js 引擎与最大内存分配
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.0012); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 300;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        // 为了支持动态调整数量，我们一次性分配最大内存空间 (Max 12000)
        const MAX_PARTICLES = 12000;
        
        // --- 核心材质与几何体设置 ---
        const innerGeometry = new THREE.BufferGeometry();
        innerGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(MAX_PARTICLES * 3), 3));
        innerGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(MAX_PARTICLES * 3), 3));
        const innerMaterial = new THREE.PointsMaterial({ size: 2.5, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9, depthWrite: false });
        const innerParticles = new THREE.Points(innerGeometry, innerMaterial);
        particleGroup.add(innerParticles);

        const outerGeometry = new THREE.BufferGeometry();
        outerGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(MAX_PARTICLES * 3), 3));
        outerGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(MAX_PARTICLES * 3), 3));
        const outerMaterial = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7, depthWrite: false });
        const outerParticles = new THREE.Points(outerGeometry, outerMaterial);
        particleGroup.add(outerParticles);

        // ==========================================
        // 2. 图案生成算法与终端控制逻辑
        // ==========================================
        let currentShape = 'sphere';
        let currentHexColor = '#00ffff';
        let currentInnerCount = 8000;
        let currentOuterCount = 5300;

        // 【核心算法】根据不同图案计算粒子坐标
        function updatePattern() {
            const innerPos = innerGeometry.attributes.position.array;
            const outerPos = outerGeometry.attributes.position.array;

            // --- 形状 A：经典双重球体 ---
            if (currentShape === 'sphere') {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    // 内层：实心球 (半径 40)
                    const rIn = 40 * Math.cbrt(Math.random());
                    innerPos[i*3] = rIn * Math.sin(phi) * Math.cos(theta);
                    innerPos[i*3+1] = rIn * Math.sin(phi) * Math.sin(theta);
                    innerPos[i*3+2] = rIn * Math.cos(phi);

                    // 外层：空心壳 (半径 45-60)
                    const rOut = 45 + 15 * Math.random();
                    outerPos[i*3] = rOut * Math.sin(phi) * Math.cos(theta);
                    outerPos[i*3+1] = rOut * Math.sin(phi) * Math.sin(theta);
                    outerPos[i*3+2] = rOut * Math.cos(phi);
                }
            }
            // --- 形状 B：银河螺旋 ---
            else if (currentShape === 'galaxy') {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    // 内层：致密核心
                    const rIn = 15 * Math.cbrt(Math.random());
                    const tIn = Math.random() * 2 * Math.PI;
                    const pIn = Math.acos(2 * Math.random() - 1);
                    innerPos[i*3] = rIn * Math.sin(pIn) * Math.cos(tIn) * 2.0; // X轴拉长
                    innerPos[i*3+1] = rIn * Math.sin(pIn) * Math.sin(tIn) * 0.5; // Y轴压扁
                    innerPos[i*3+2] = rIn * Math.cos(pIn) * 2.0; // Z轴拉长

                    // 外层：四条螺旋臂
                    const arms = 4;
                    const armOffset = (i % arms) * (Math.PI * 2 / arms);
                    const distance = 10 + Math.random() * 70; // 悬臂延伸距离
                    const twist = 0.05; // 扭曲度
                    const angle = distance * twist + armOffset + (Math.random() * 0.4 - 0.2); // 加入散乱度
                    
                    outerPos[i*3] = distance * Math.cos(angle);
                    outerPos[i*3+1] = (Math.random() - 0.5) * (80 / distance); // 越向外越薄
                    outerPos[i*3+2] = distance * Math.sin(angle);
                }
            }
            // --- 形状 C：时空星环 (甜甜圈) ---
            else if (currentShape === 'torus') {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI * 2;
                    
                    // 内层：紧凑的内环
                    const R_in = 30; const r_in = 8 * Math.random();
                    innerPos[i*3] = (R_in + r_in * Math.cos(v)) * Math.cos(u);
                    innerPos[i*3+1] = r_in * Math.sin(v);
                    innerPos[i*3+2] = (R_in + r_in * Math.cos(v)) * Math.sin(u);

                    // 外层：稀疏宽广的外环
                    const R_out = 60; const r_out = 15 * Math.random();
                    outerPos[i*3] = (R_out + r_out * Math.cos(v)) * Math.cos(u);
                    outerPos[i*3+1] = r_out * Math.sin(v) * 0.5; // 压扁外环
                    outerPos[i*3+2] = (R_out + r_out * Math.cos(v)) * Math.sin(u);
                }
            }

            innerGeometry.attributes.position.needsUpdate = true;
            outerGeometry.attributes.position.needsUpdate = true;
        }

        // 【颜色算法】解析 HEX，并赋予粒子带有少许随机差的色调
        function updateColors() {
            const baseColor = new THREE.Color(currentHexColor);
            const hsl = {};
            baseColor.getHSL(hsl);

            const innerCol = innerGeometry.attributes.color.array;
            const outerCol = outerGeometry.attributes.color.array;

            for (let i = 0; i < MAX_PARTICLES; i++) {
                // 内层更亮
                const colorIn = new THREE.Color().setHSL(hsl.h, hsl.s, Math.min(1.0, hsl.l + 0.2 + Math.random() * 0.2));
                innerCol[i*3] = colorIn.r; innerCol[i*3+1] = colorIn.g; innerCol[i*3+2] = colorIn.b;

                // 外层深邃
                const colorOut = new THREE.Color().setHSL(Math.min(1.0, hsl.h + 0.05), hsl.s, hsl.l + Math.random() * 0.1);
                outerCol[i*3] = colorOut.r; outerCol[i*3+1] = colorOut.g; outerCol[i*3+2] = colorOut.b;
            }

            innerGeometry.attributes.color.needsUpdate = true;
            outerGeometry.attributes.color.needsUpdate = true;
        }

        // 初始化第一次渲染
        updatePattern();
        updateColors();
        innerGeometry.setDrawRange(0, currentInnerCount);
        outerGeometry.setDrawRange(0, currentOuterCount);

        // --- 绑定终端 UI 事件 ---
        document.getElementById('toggle-btn').addEventListener('click', () => {
            const panel = document.getElementById('terminal-wrapper');
            panel.classList.toggle('collapsed');
            document.getElementById('toggle-btn').innerText = panel.classList.contains('collapsed') ? '▶ 展开终端' : '◀ 隐藏面板';
        });

        document.getElementById('shape-select').addEventListener('change', (e) => {
            currentShape = e.target.value;
            updatePattern();
        });

        document.getElementById('color-picker').addEventListener('input', (e) => {
            currentHexColor = e.target.value;
            updateColors();
        });

        document.getElementById('inner-count').addEventListener('input', (e) => {
            currentInnerCount = parseInt(e.target.value);
            innerGeometry.setDrawRange(0, currentInnerCount);
        });

        document.getElementById('outer-count').addEventListener('input', (e) => {
            currentOuterCount = parseInt(e.target.value);
            outerGeometry.setDrawRange(0, currentOuterCount);
        });

        // ==========================================
        // 3. 手势控制逻辑 (保持原有的高级锁定与惯性引擎)
        // ==========================================
        let targetScale = 1.0;
        let currentScale = 1.0;
        let targetPosition = new THREE.Vector3(0, 0, 0);
        let rotationVelocityX = 0; 
        let rotationVelocityY = 0; 
        let lastIndexPos = null; 

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function getDistance(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

        const videoElement = document.querySelector('.input_video');
        const statusText = document.getElementById('statusText');

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                const wrist = landmarks[0];         
                const palmCenter = landmarks[9];    
                const indexTip = landmarks[8];      
                const middleTip = landmarks[12];    
                const ringTip = landmarks[16];      
                const pinkyTip = landmarks[20];     

                const referenceDist = getDistance(wrist, palmCenter);
                const extIndex = getDistance(wrist, indexTip) / referenceDist;
                const extMiddle = getDistance(wrist, middleTip) / referenceDist;
                const extRing = getDistance(wrist, ringTip) / referenceDist;
                const extPinky = getDistance(wrist, pinkyTip) / referenceDist;

                const isIndexPointing = extIndex > 1.5 && extMiddle < 1.5 && extRing < 1.5 && extPinky < 1.5;
                const isFist = extIndex < 1.3 && extMiddle < 1.3 && extRing < 1.3 && extPinky < 1.3;

                const mappedX = -(palmCenter.x - 0.5) * window.innerWidth * 0.4; 
                const mappedY = -(palmCenter.y - 0.5) * window.innerHeight * 0.4;
                targetPosition.set(mappedX, mappedY, 0);

                const openness = (extIndex + extMiddle + extRing + extPinky) / 4;
                const normalizedOpenness = Math.max(0, Math.min(1, (openness - 1.0) / 1.2));
                const intendedScale = 0.8 + Math.pow(normalizedOpenness, 2.0) * 14.2; 

                // 霸体锁与状态机
                if (isIndexPointing) {
                    statusText.innerHTML = "🟢 霸体锁定：内部旋转模式激活";
                    targetScale = currentScale; 
                    
                    if (lastIndexPos) {
                        const deltaX = indexTip.x - lastIndexPos.x;
                        const deltaY = indexTip.y - lastIndexPos.y;
                        rotationVelocityX += deltaX * 3.5; 
                        rotationVelocityY += deltaY * 3.5; 
                    }
                } else if (isFist) {
                    statusText.innerHTML = "🔴 空间坍缩：已返回基础视界";
                    targetScale = 0.8;
                } else {
                    statusText.innerHTML = "🔵 维度穿梭：通过张合控制空间";
                    if (extIndex > 1.5) {
                        targetScale = Math.max(targetScale, intendedScale); 
                    } else {
                        targetScale = intendedScale;
                    }
                }
                lastIndexPos = { x: indexTip.x, y: indexTip.y };

            } else {
                statusText.innerHTML = "⚪ 系统待机 - 未侦测到手势";
                lastIndexPos = null;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();

        // ==========================================
        // 4. 渲染动画循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            currentScale += (targetScale - currentScale) * 0.08; 
            particleGroup.scale.set(currentScale, currentScale, currentScale);
            particleGroup.position.lerp(targetPosition, 0.1);

            particleGroup.rotation.y -= rotationVelocityX; 
            particleGroup.rotation.x -= rotationVelocityY; 
            rotationVelocityX *= 0.95; 
            rotationVelocityY *= 0.95; 

            // 底层基础流转依然存在，不受图形改变的影响
            innerParticles.rotation.y += 0.003; 
            outerParticles.rotation.y -= 0.001; 
            outerParticles.rotation.z += 0.0005;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
